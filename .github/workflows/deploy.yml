name: Deploy
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  DISABLE_ESLINT_PLUGIN: "true"
  VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

jobs:
  ci: # build + test in GHA: gates deploy AND warms remote cache
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc # pin once, used everywhere
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run build # add `lint` and `test` when you have it

  deploy:
    needs: ci # only deploy if ci passed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy backend (Render)
        run: curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - name: Deploy client (Vercel)
        run: pnpm --allow-build=esbuild dlx vercel@latest deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_CLIENT_PROJECT_ID }}
